<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
    </style>
  </defs>

  <!-- White background -->
  <rect width="1200" height="630" fill="white"/>

  <!-- Main text: "Logistics" -->
  <text x="600" y="240" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="140" font-weight="900" text-anchor="middle" fill="#0D0D0D" letter-spacing="-4" dominant-baseline="middle">
    Logistics
  </text>

  <!-- Main text: "without the luck." -->
  <text x="600" y="380" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="140" font-weight="900" text-anchor="middle" fill="#0D0D0D" letter-spacing="-4" dominant-baseline="middle">
    without the luck.
  </text>

  <!-- Logo container - bottom right -->
  <g transform="translate(1104, 564)">
    <!-- Logo background square -->
    <rect width="48" height="48" rx="11" fill="#0D0D0D"/>

    <!-- Route path -->
    <path d="M 34 12 C 34 7 13 7 13 18 C 13 29 34 29 34 38" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"/>

    <!-- Start dot -->
    <circle cx="34" cy="12" r="3.5" fill="white"/>

    <!-- End dot -->
    <circle cx="34" cy="38" r="3.5" fill="white"/>
  </g>
</svg>
